<!DOCTYPE html>
<html>
<head>
<title>AYSTAN | Men Luxury Streetwear</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:black;color:gold;}
header{display:flex;justify-content:space-between;padding:20px 50px;background:#0d0d0d;}
.logo{font-size:28px;letter-spacing:4px;}
nav a{color:gold;text-decoration:none;margin-left:20px;}
.hero{
height:90vh;
background:url('https://images.unsplash.com/photo-1516826957135-700dedea698c') center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}
.hero h1{font-size:55px;}
.btn{
padding:12px 30px;
background:gold;
color:black;
border:none;
cursor:pointer;
font-weight:bold;
margin-top:20px;
}
.products{padding:80px 50px;text-align:center;}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
margin-top:40px;
}
.card{background:#111;padding:20px;}
.card img{width:100%;height:300px;object-fit:cover;}
footer{text-align:center;padding:30px;background:#0d0d0d;margin-top:40px;}
.cart{
position:fixed;
top:20px;
right:20px;
background:gold;
color:black;
padding:10px 15px;
border-radius:20px;
}
</style>
</head>

<body>

<div class="cart">
Cart: <span id="cart-count">0</span>
</div>

<header>
<div class="logo">AYSTAN</div>
<nav>
<a href="#">Home</a>
<a href="#shop">Shop</a>
<a href="checkout.html">Checkout</a>
</nav>
</header>

<section class="hero">
<h1>Power In Style</h1>
<p>Elite Streetwear For Modern Kings</p>
<button class="btn" onclick="scrollToShop()">Shop Now</button>
</section>

<section class="products" id="shop">
<h2>Luxury Collection</h2>
<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1520975918318-7d3d6a0f7c2c">
<h3>Signature Jacket</h3>
<p>$150</p>
<button class="btn" onclick="addToCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1520974735194-9f92eec2f01c">
<h3>Premium Hoodie</h3>
<p>$95</p>
<button class="btn" onclick="addToCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
<h3>Luxury Set</h3>
<p>$220</p>
<button class="btn" onclick="addToCart()">Add to Cart</button>
</div>

</div>
</section>

<footer>
© 2026 AYSTAN | Men Luxury Streetwear
</footer>

<script>
let count=0;
function addToCart(){
count++;
document.getElementById("cart-count").innerText=count;
}
function scrollToShop(){
document.getElementById("shop").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
