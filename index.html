<!DOCTYPE html>
<html>
<head>
<title>AYSTAN | Luxury Fashion</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{
  background:#F7E5C1; /* Dutch White */
  color:#1C393F; /* Gunmetal for text */
}
header{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background:#1C393F; /* Gunmetal navbar */
  color:#F7E5C1;
  align-items:center;
}
.logo{
  font-size:28px;
  letter-spacing:4px;
}
nav a{
  color:#F7E5C1;
  text-decoration:none;
  margin-left:20px;
  transition:0.3s;
}
nav a:hover{
  color:#B7A85C; /* Ecru hover */
}
.hero{
  height:90vh;
  background:url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d') center/cover;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:#1C393F;
}
.hero h1{
  font-size:55px;
}
.btn{
  padding:12px 30px;
  background:#B7A85C; /* Ecru button */
  color:#F7E5C1; /* Dutch White text */
  border:none;
  cursor:pointer;
  font-weight:bold;
  margin-top:20px;
  transition:0.3s;
}
.btn:hover{
  background:#1C393F; /* Gunmetal hover */
  color:#F7E5C1;
}
.products{
  padding:80px 50px;
  text-align:center;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
  margin-top:40px;
}
.card{
  background:#F7E5C1; /* Dutch White cards */
  padding:20px;
  border:1px solid #B7A85C; /* subtle Ecru border */
  transition:0.4s;
}
.card:hover{
  transform:scale(1.05);
}
.card img{
  width:100%;
  height:300px;
  object-fit:cover;
}
footer{
  text-align:center;
  padding:30px;
  background:#1C393F; /* Gunmetal footer */
  color:#F7E5C1;
  margin-top:40px;
}
.cart{
  position:fixed;
  top:20px;
  right:20px;
  background:#B7A85C; /* Ecru cart */
  color:#1C393F; /* Gunmetal text */
  padding:10px 15px;
  border-radius:20px;
}
</style>
</head>

<body>

<div class="cart">
Cart: <span id="cart-count">0</span>
</div>

<header>
<div class="logo">AYSTAN</div>
<nav>
<a href="#">Home</a>
<a href="#shop">Shop</a>
<a href="checkout.html">Checkout</a>
</nav>
</header>

<section class="hero">
<h1>Power In Style</h1>
<p>Elite Streetwear For Modern Kings</p>
<button class="btn" onclick="scrollToShop()">Shop Now</button>
</section>

<section class="products" id="shop">
<h2>Luxury Collection</h2>
<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1520975918318-7d3d6a0f7c2c">
<h3>Signature Jacket</h3>
<p>$150</p>
<button class="btn" onclick="addToCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1520974735194-9f92eec2f01c">
<h3>Premium Hoodie</h3>
<p>$95</p>
<button class="btn" onclick="addToCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
<h3>Luxury Set</h3>
<p>$220</p>
<button class="btn" onclick="addToCart()">Add to Cart</button>
</div>

</div>
</section>

<footer>
© 2026 AYSTAN | Men Luxury Streetwear
</footer>

<script>
let count=0;
function addToCart(){
count++;
document.getElementById("cart-count").innerText=count;
}
function scrollToShop(){
document.getElementById("shop").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
